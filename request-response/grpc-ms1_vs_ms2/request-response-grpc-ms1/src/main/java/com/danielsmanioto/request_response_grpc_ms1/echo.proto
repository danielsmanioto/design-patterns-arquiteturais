syntax = "proto3";
option java_multiple_files = true;
option java_package = "com.exemplo.grpc";
option java_outer_classname = "EchoProto";

service EchoService {
  rpc echo(EchoRequest) returns (EchoResponse);
}

message EchoRequest {
  string message = 1;
}

message EchoResponse {
  string reply = 1;
}